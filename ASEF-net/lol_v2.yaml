# ASEF-Net Configuration for LOL-v2 Real dataset

experiment_name: "asef_lol_v2"

# Dataset settings
dataset:
  name: "lol_v2_real"  # lol_v1, lol_v2_real, lol_v2_synthetic, sid
  root: "/path/to/LOL"  # <-- dataset root directory (use lol_v1.yaml if only LOL-v1 is available)
  img_size: 256

# Model architecture
model:
  version: "full"  # "full" or "lite"
  in_ch: 3
  base_ch: 32
  num_blocks: [2, 3, 4]  # Encoder blocks per stage
  ode_steps: 5  # Number of ODE steps (K)
  lambda_coupling: 0.01  # Spatial coupling weight
  use_spatial_coupling: true

# Loss weights
loss:
  w_rec: 1.0      # Reconstruction (Charbonnier)
  w_per: 0.1      # Perceptual (VGG)
  w_color: 0.08   # Global color + chroma consistency
  w_sat: 0.08     # Saturation preservation
  w_contrast: 0.06 # Local luminance contrast preservation
  w_tone: 0.08    # Luminance distribution and highlight recovery
  w_smooth: 0.005 # Edge-aware smoothness
  w_field: 0.02   # Field regularization

# Training settings
training:
  epochs: 300
  batch_size: 8
  lr: 2e-4
  weight_decay: 1e-4
  num_workers: 4
  vis_every: 100  # Visualize every N batches
