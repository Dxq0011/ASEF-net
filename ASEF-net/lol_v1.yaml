# ASEF-Net Configuration for LOL-v1 dataset

experiment_name: "asef_lol_v1"

# Dataset settings
dataset:
  name: "lol_v1"
  root: "/path/to/LOL"
  img_size: 256

# Model architecture
model:
  version: "full"
  in_ch: 3
  base_ch: 32
  num_blocks: [2, 3, 4]
  ode_steps: 6
  lambda_coupling: 0.01
  use_spatial_coupling: true

# Loss weights
loss:
  w_rec: 1.0
  w_per: 0.1
  w_color: 0.08
  w_sat: 0.08
  w_contrast: 0.06
  w_tone: 0.08
  w_smooth: 0.005
  w_field: 0.02

# Training settings
training:
  epochs: 300
  batch_size: 4    # 8GB显存下256x256用4
  lr: 2e-4
  weight_decay: 1e-4
  num_workers: 0
  vis_every: 100
