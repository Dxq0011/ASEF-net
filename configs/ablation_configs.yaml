"""
Ablation Study Configurations for ASEF-Net v2
For Top-Tier Journal Submission

Each configuration tests the contribution of a specific component.
"""

# Base configuration
base: &base
  experiment_name: "asef_v2_base"
  model:
    version: "v2"
    in_ch: 3
    base_ch: 32
    num_blocks: [2, 3, 4]
    num_exposures: 16
    embed_dim: 32
    ode_steps: 10
    lambda_coupling: 0.01
    use_spatial_coupling: true
    use_crf: true
    use_adaptive: true
  dataset:
    name: "lol"
    root: "data/LOL"
    img_size: 256
  training:
    epochs: 300
    batch_size: 8
    lr: 1.0e-4
    weight_decay: 1.0e-4
    num_workers: 4
  loss:
    w_rec: 1.0
    w_per: 0.1
    w_color: 0.05
    w_smooth: 0.01
    w_sat: 0.05
    w_contrast: 0.05
    w_tone: 0.08
    w_physics: 0.1
    w_trajectory: 0.01

# Ablation 1: Without CRF (no physics-informed ODE)
ablation_no_crf:
  <<: *base
  experiment_name: "ablation_no_crf"
  model:
    <<: *base[model]
    use_crf: false

# Ablation 2: Without Adaptive Step (uniform steps)
ablation_no_adaptive:
  <<: *base
  experiment_name: "ablation_no_adaptive"
  model:
    <<: *base[model]
    use_adaptive: false

# Ablation 3: Without Spatial Coupling
ablation_no_coupling:
  <<: *base
  experiment_name: "ablation_no_coupling"
  model:
    <<: *base[model]
    use_spatial_coupling: false

# Ablation 4: Without Exposure Embedding
ablation_no_embedding:
  <<: *base
  experiment_name: "ablation_no_embedding"
  model:
    <<: *base[model]
    num_exposures: 1  # Effectively disables embedding

# Ablation 5: Without Physics Loss
ablation_no_physics_loss:
  <<: *base
  experiment_name: "ablation_no_physics_loss"
  loss:
    <<: *base[loss]
    w_physics: 0.0
    w_trajectory: 0.0

# Ablation 6: Euler Solver (instead of RK4)
ablation_euler:
  <<: *base
  experiment_name: "ablation_euler"
  # This requires code modification to use Euler solver

# Ablation 7: Single Field (v only, no n, c)
ablation_v_only:
  <<: *base
  experiment_name: "ablation_v_only"
  # This requires code modification to disable n, c branches

# Ablation 8: No Refinement Module
ablation_no_refinement:
  <<: *base
  experiment_name: "ablation_no_refinement"
  # This requires code modification to skip refinement

# Ablation 9: Fewer ODE Steps
ablation_fewer_steps:
  <<: *base
  experiment_name: "ablation_fewer_steps"
  model:
    <<: *base[model]
    ode_steps: 5

# Ablation 10: More ODE Steps
ablation_more_steps:
  <<: *base
  experiment_name: "ablation_more_steps"
  model:
    <<: *base[model]
    ode_steps: 20
